services:
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    cpus: ${REDIS_CPU_LIMIT}
    mem_limit: ${REDIS_MEM_LIMIT}

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - ${API_PORT}:8000
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
    cpus: ${API_CPU_LIMIT}
    mem_limit: ${API_MEM_LIMIT}

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal
    cpus: ${WORKER_CPU_LIMIT}
    mem_limit: ${WORKER_MEM_LIMIT}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      API_URL: ${API_URL}
      PORT: ${FRONTEND_PORT}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - ${FRONTEND_PORT}:3000
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    cpus: ${FRONTEND_CPU_LIMIT}
    mem_limit: ${FRONTEND_MEM_LIMIT}

networks:
  internal:
    name: ${INTERNAL_NETWORK_NAME}
